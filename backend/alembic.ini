# Alembic configuration file
# Run migrations with:  alembic upgrade head
# Create new migration: alembic revision --autogenerate -m "describe your change"

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template for naming migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for file timestamps
timezone = UTC

# Prepend sys.path with these directories (needed so alembic can import app/)
prepend_sys_path = .

# Leave blank — DATABASE_URL is read from .env inside env.py
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
